<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodCal - Database Visuelle</title>
    <!-- Utilisation d'une police très moderne et géométrique -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --border: rgba(226, 232, 240, 0.8);
            
            /* Couleurs de visualisation des calories */
            --cal-low: #10b981;
            --cal-med: #f59e0b;
            --cal-high: #ef4444;

            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 10px 20px rgba(0,0,0,0.04), 0 2px 6px rgba(0,0,0,0.04);
            --shadow-hover: 0 20px 40px rgba(99, 102, 241, 0.1), 0 8px 16px rgba(0,0,0,0.04);
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 3rem 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* --- Fond animé (Mesh Gradient CSS) --- */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #f8fafc;
        }
        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #e0e7ff; animation-delay: 0s; }
        .blob-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: #fce7f3; animation-delay: -5s; }
        .blob-3 { top: 40%; left: 60%; width: 40vw; height: 40vw; background: #dcfce7; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* --- Header & Recherche --- */
        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: slideDownPop 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #1e293b, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 500;
        }

        .search-wrapper {
            max-width: 650px;
            margin: 0 auto 3rem auto;
            position: relative;
            animation: slideUpPop 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .search-container input {
            width: 100%;
            padding: 1.2rem 1.5rem 1.2rem 3.5rem;
            font-size: 1.15rem;
            font-family: inherit;
            border: 2px solid var(--border);
            border-radius: 100px;
            outline: none;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--shadow-md);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: var(--text-main);
        }

        .search-container input::placeholder { color: #94a3b8; }

        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 6px var(--primary-glow), var(--shadow-md);
            background: var(--surface-solid);
        }

        .search-container input:focus + .search-icon { color: var(--primary); }

        .results-info {
            text-align: center;
            margin-top: -1.5rem;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 600;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards 0.5s;
        }

        /* --- Grille de résultats --- */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* --- Design des Cartes --- */
        .card {
            background: var(--surface-solid);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.8rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
            overflow: hidden;
            
            /* État initial pour l'animation */
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }

        .card.animate-in {
            animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: var(--shadow-hover);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .emoji-wrapper {
            position: relative;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* Bounce effect */
        }

        .card:hover .emoji-wrapper {
            transform: scale(1.15) rotate(10deg);
            background: #eef2ff;
        }

        .titles { flex: 1; }

        .titles h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .titles p {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .card-data {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .kcal-display {
            display: flex;
            flex-direction: column;
        }

        .kcal-number {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .kcal-unit {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 4px;
        }

        .meta-info {
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--bg-color);
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: 600;
        }

        /* --- Visualisation : Barre de densité calorique --- */
        .cal-viz {
            width: 100%;
            height: 6px;
            background: var(--bg-color);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            margin-top: 5px;
        }

        .cal-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.5s;
            width: 0%; /* S'animera en JS */
        }

        /* --- États divers --- */
        .loading-spinner {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            animation: fadeIn 0.5s forwards;
        }

        .no-results .big-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite alternate;
        }

        .no-results h3 { font-size: 1.5rem; color: var(--text-main); margin-bottom: 0.5rem; }
        .no-results p { color: var(--text-muted); }

        /* --- Animations --- */
        @keyframes slideDownPop {
            0% { opacity: 0; transform: translateY(-40px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes slideUpPop {
            0% { opacity: 0; transform: translateY(40px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes cardEnter {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            body { padding: 2rem 1rem; }
            .results-grid { grid-template-columns: 1fr; gap: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Fond ambiant animé -->
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header>
        <h1>FoodCal.</h1>
        <p>Explorez la valeur nutritionnelle de vos aliments</p>
    </header>

    <main>
        <div class="search-wrapper">
            <div class="search-container">
                <!-- SVG Icon Recherche -->
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Rechercher (ex: Avocat, Saumon, Riz...)" autocomplete="off">
            </div>
        </div>

        <div class="results-info" id="resultsCount"></div>

        <div class="results-grid" id="resultsGrid">
            <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
    </main>

    <script>
        let foodDatabase = [];
        const searchInput = document.getElementById('searchInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const resultsCount = document.getElementById('resultsCount');

        // Référence max de calories pour la barre de visualisation (Huile ~ 900kcal/100g)
        const MAX_KCAL_REF = 900;

        // Charger le fichier JSON
        async function loadData() {
            try {
                const response = await fetch('data/Open-food-calories.json');
                if (!response.ok) throw new Error("Fichier introuvable");
                foodDatabase = await response.json();
                displayResults(foodDatabase);
            } catch (error) {
                console.error(error);
                resultsGrid.innerHTML = `
                    <div class="no-results">
                        <div class="big-emoji">🔌</div>
                        <h3>Erreur de connexion</h3>
                        <p>Impossible de charger la base de données (data/food.json).</p>
                    </div>`;
                resultsCount.innerText = "";
            }
        }

        // Déterminer la couleur de la barre calorique
        function getCalColor(kcal) {
            if (kcal < 100) return 'var(--cal-low)';     // Vert
            if (kcal < 300) return 'var(--cal-med)';     // Orange
            return 'var(--cal-high)';                    // Rouge
        }

        // Fonction pour générer le HTML d'une carte
        function createCardHTML(food, index) {
            // Calcul pour la visualisation
            const percentage = Math.min((food.kcal_per_100g / MAX_KCAL_REF) * 100, 100);
            const color = getCalColor(food.kcal_per_100g);
            
            // Délai d'animation en cascade (stagger effect)
            const delay = (index * 0.04).toFixed(2);

            const metaHTML = food.weight_per_unit > 0 
                ? `~ ${food.weight_per_unit}g / unité` 
                : `${food.type === 'solid' ? 'Aliment Solide' : 'Liquide'}`;

            return `
                <div class="card animate-in" style="animation-delay: ${delay}s">
                    <div class="card-header">
                        <div class="emoji-wrapper">${food.emoji}</div>
                        <div class="titles">
                            <h2>${food.name}</h2>
                            <p>${food.english_name}</p>
                        </div>
                    </div>
                    
                    <div class="card-data">
                        <div class="kcal-display">
                            <span class="kcal-number" style="color: ${color}">${food.kcal_per_100g}</span>
                            <span class="kcal-unit">kcal pour 100g</span>
                        </div>
                        <div class="meta-info">${metaHTML}</div>
                    </div>

                    <!-- Visualisation de densité -->
                    <div class="cal-viz">
                        <div class="cal-bar" style="width: 0%; background-color: ${color}; animation: fillBar 1s ease-out forwards ${parseFloat(delay) + 0.3}s;"></div>
                    </div>
                </div>
            `;
        }

        // Ajouter dynamiquement la keyframe pour la barre de progression (pour éviter l'inline limitant)
        const styleSheet = document.createElement("style");
        document.head.appendChild(styleSheet);

        // Afficher les résultats
        function displayResults(data) {
            resultsGrid.innerHTML = '';

            if (data.length === 0) {
                resultsGrid.innerHTML = `
                    <div class="no-results">
                        <div class="big-emoji">👻</div>
                        <h3>Aucun résultat</h3>
                        <p>Essayez avec un autre terme de recherche.</p>
                    </div>`;
                resultsCount.innerText = "0 aliment trouvé";
                return;
            }

            // Met à jour le compteur
            resultsCount.innerText = `${data.length} aliment${data.length > 1 ? 's' : ''} trouvé${data.length > 1 ? 's' : ''}`;

            let html = '';
            // Limiter à 100 pour garder des perfs optimales sur les grosses DB
            const limit = Math.min(data.length, 100);
            
            // On injecte les animations spécifiques de remplissage de barre dans le DOM pour cette session
            let keyframesHTML = "";

            for (let i = 0; i < limit; i++) {
                const percentage = Math.min((data[i].kcal_per_100g / MAX_KCAL_REF) * 100, 100);
                html += createCardHTML(data[i], i);
                
                // On triche un peu avec CSS inline custom variables si on voulait, 
                // mais remplacer dynamiquement inline dans la carte est plus simple. 
                // Pour animer la width depuis 0 vers X%, on l'a géré en remplaçant l'animation par une classe.
                // Correction plus propre : on utilise une variable CSS inline.
            }
            
            // Modification du générateur HTML pour utiliser les variables CSS inline au lieu d'une keyframe générée
            html = html.replace(/animation: fillBar[^;]+;/g, ""); // Nettoyage de l'ancienne tentative
            
            // Injection
            resultsGrid.innerHTML = html;

            // Déclencher l'animation des barres après un court délai pour laisser le DOM se créer
            setTimeout(() => {
                const bars = document.querySelectorAll('.cal-bar');
                bars.forEach((bar, index) => {
                    const dataIndex = index;
                    if(data[dataIndex]) {
                         const percentage = Math.min((data[dataIndex].kcal_per_100g / MAX_KCAL_REF) * 100, 100);
                         bar.style.width = `${percentage}%`;
                    }
                });
            }, 50);
        }

        // Écouter la barre de recherche
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            
            // Filtrer la base de données
            const filteredData = foodDatabase.filter(food => {
                const matchFR = food.name.toLowerCase().includes(searchTerm);
                const matchEN = food.english_name.toLowerCase().includes(searchTerm);
                return matchFR || matchEN;
            });

            // Trier pour mettre les correspondances exactes en premier
            filteredData.sort((a, b) => {
                const aStarts = a.name.toLowerCase().startsWith(searchTerm);
                const bStarts = b.name.toLowerCase().startsWith(searchTerm);
                if (aStarts && !bStarts) return -1;
                if (!aStarts && bStarts) return 1;
                return 0;
            });

            displayResults(filteredData);
        });

        // Lancer l'application
        loadData();
    </script>
</body>
</html>
